[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "midscene-android"
version = "0.1.1"
description = "AI-powered Android automation via Midscene.js, bridged into Python"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
keywords = ["android", "automation", "testing", "ai", "midscene"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "pytest>=8.4.2",
    "python-dotenv>=1.2.1",
    "requests>=2.28",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-mock",
    "build",
    "twine",
    "requests",
    "ruff",
]

[tool.pytest.ini_options]
markers = [
    "device: tests that require a real Android device connected via ADB and a valid AI Key",
]

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["midscene_android"]

[tool.setuptools.packages.find]
where = ["."]
include = ["midscene_android*"]

[tool.setuptools.package-data]
midscene_android = [
    # 平台 Node 可执行文件（构建时只保留目标平台的文件，其余已删除）
    "_runtime/bin/node-linux-x64",
    "_runtime/bin/node-linux-arm64",
    "_runtime/bin/node-darwin-x64",
    "_runtime/bin/node-darwin-arm64",
    "_runtime/bin/node-win32-x64.exe",
    "_runtime/bin/node.cmd",          # Windows PATH shim
    # 内置 npm（npm install 时使用，无需系统 npm）
    "_runtime/npm/**",
    # Node.js RPC 服务源码
    "_node_service/package.json",
    "_node_service/service.js",
]
